# Production: pulls pre-built images from ECR — no source code needed on EC2.
#
# On EC2, place this file at ~/docker-compose.prod.yml alongside:
#   .env.prod          — environment variables (never commit)
#   nginx.conf         — copy of nginx/nginx.prod.conf from this repo
#   certbot-webroot/   — mkdir ~/certbot-webroot
#
# Start: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# Update: docker compose -f docker-compose.prod.yml --env-file .env.prod pull && up -d

name: school-erp

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 120M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  api:
    image: ${ECR_API_URL}:latest
    restart: unless-stopped
    env_file: .env.prod
    expose:
      - "5001"
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 400M
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    logging: *default-logging

  celery-worker:
    image: ${ECR_API_URL}:latest
    restart: unless-stopped
    entrypoint: ["celery", "-A", "celery_worker:celery", "worker", "-l", "info", "--concurrency=2"]
    env_file: .env.prod
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 250M
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    logging: *default-logging

  celery-beat:
    image: ${ECR_API_URL}:latest
    restart: unless-stopped
    entrypoint: ["celery", "-A", "celery_worker:celery", "beat", "-l", "info"]
    env_file: .env.prod
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 150M
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    logging: *default-logging

  admin-web:
    image: ${ECR_ADMIN_WEB_URL}:latest
    restart: unless-stopped
    env_file: .env.prod
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 300M
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

  panel:
    image: ${ECR_PANEL_URL}:latest
    restart: unless-stopped
    env_file: .env.prod
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 300M
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 50M
    depends_on:
      api:
        condition: service_healthy
      admin-web:
        condition: service_started
      panel:
        condition: service_started
    logging: *default-logging
