# AWS EC2 / ECR — pull pre-built images only (no local build).
# Run from school-erp-infra: docker compose -f docker/docker-compose.ecr.yml --env-file env/.env.prod up -d
# Or: ./scripts/start-prod.sh

name: school-erp-ecr

x-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 100M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ${ECR_API_URL}:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 300M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
      - ../env/.env.prod
    expose:
      - "${API_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${API_PORT}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      redis:
        condition: service_healthy

  celery-worker:
    image: ${ECR_API_URL}:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 200M
    env_file:
      - ../env/.env.prod
    entrypoint: ["celery", "-A", "celery_worker:celery", "worker", "-l", "info"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  celery-beat:
    image: ${ECR_API_URL}:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 100M
    env_file:
      - ../env/.env.prod
    entrypoint: ["celery", "-A", "celery_worker:celery", "beat", "-l", "info"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  admin-web:
    image: ${ECR_ADMIN_WEB_URL}:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 200M
    env_file:
      - ../env/.env.prod
    environment:
      # The shared .env.prod sets PORT=5001 for the Flask API.
      # Next.js binds to PORT, so override it for the web apps.
      - PORT=3000
      - HOSTNAME=0.0.0.0
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  panel:
    image: ${ECR_PANEL_URL}:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 200M
    env_file:
      - ../env/.env.prod
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 50M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ../nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # PEM pair: fullchain.pem + privkey.pem (see nginx/nginx.prod.conf header).
      - ${SSL_CERT_DIR:-../nginx/ssl}:/etc/nginx/ssl:ro
      - ${ACME_WEBROOT:-../nginx/certbot-webroot}:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      admin-web:
        condition: service_started
      panel:
        condition: service_started
