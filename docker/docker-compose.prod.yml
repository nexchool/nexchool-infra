# From infra repo root: ./scripts/prod.sh
# Nginx: host ${HTTP_PORT} -> container 8080 (matches nginx/nginx.conf listen 8080).

name: school-erp

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-api-env: &api-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-${REDIS_URL}}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-${REDIS_URL}}
  PORT: ${API_PORT:-5001}
  GUNICORN_BIND: 0.0.0.0:${API_PORT:-5001}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-school_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  api:
    build:
      context: ${SERVER_CONTEXT:-../../server}
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - ../env/.env.prod
    environment:
      <<: *api-env
      FLASK_ENV: ${FLASK_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request, os; p=os.getenv('PORT','5001'); urllib.request.urlopen(f'http://api:{p}/api/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 8s
      retries: 5
      start_period: 60s
    logging: *default-logging

  celery-worker:
    build:
      context: ${SERVER_CONTEXT:-../../server}
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    entrypoint: ["celery", "-A", "backend.celery_worker:celery", "worker", "-l", "info"]
    env_file:
      - ../env/.env.prod
    environment:
      <<: *api-env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    logging: *default-logging

  celery-beat:
    build:
      context: ${SERVER_CONTEXT:-../../server}
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    entrypoint: ["celery", "-A", "backend.celery_worker:celery", "beat", "-l", "info"]
    env_file:
      - ../env/.env.prod
    environment:
      <<: *api-env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    logging: *default-logging

  admin-web:
    build:
      context: ${SCHOOL_ADMIN_CONTEXT:-../../admin-web}
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    restart: unless-stopped
    env_file:
      - ../env/.env.prod
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

  panel:
    build:
      context: ${SUPER_ADMIN_CONTEXT:-../../panel}
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    restart: unless-stopped
    env_file:
      - ../env/.env.prod
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      # Host HTTP_PORT → container 8080 (nginx listen in nginx/nginx.conf)
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      admin-web:
        condition: service_started
      panel:
        condition: service_started
    logging: *default-logging

volumes:
  postgres_data:
