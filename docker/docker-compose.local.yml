# From infra root: ./scripts/dev.sh
# Build/volume paths are relative to this file's directory (docker/).
# Nested layout: apps at ../../server, ../../admin-web, ../../panel (monorepo root).
# Nginx: host ${HTTP_PORT} -> container 80 (uses nginx/nginx.local.conf).

name: school-erp-local

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-api-env: &api-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-${REDIS_URL}}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-${REDIS_URL}}
  PORT: ${API_PORT:-5001}
  FLASK_PORT: ${API_PORT:-5001}
  GUNICORN_BIND: 0.0.0.0:${API_PORT:-5001}
  # Pick up new Flask routes / code without manual restart (bind-mounted server tree).
  GUNICORN_RELOAD: ${GUNICORN_RELOAD:-1}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-school_erp}
    ports:
      # Host port for pgAdmin / DBeaver (change if 5432 is already in use)
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  api:
    build:
      context: ${SERVER_CONTEXT:-../../server}
      dockerfile: Dockerfile.dev
    volumes:
      - ${SERVER_CONTEXT:-../../server}:/app
    env_file:
      - ../env/.env.local
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request, os; p=os.getenv('PORT','5001'); urllib.request.urlopen(f'http://api:{p}/api/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 8s
      retries: 5
      start_period: 60s
    logging: *default-logging

  celery-worker:
    build:
      context: ${SERVER_CONTEXT:-../../server}
      dockerfile: Dockerfile.dev
    entrypoint: ["celery", "-A", "backend.celery_worker:celery", "worker", "-l", "info"]
    volumes:
      - ${SERVER_CONTEXT:-../../server}:/app
    env_file:
      - ../env/.env.local
    environment:
      <<: *api-env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  celery-beat:
    build:
      context: ${SERVER_CONTEXT:-../../server}
      dockerfile: Dockerfile.dev
    entrypoint: ["celery", "-A", "backend.celery_worker:celery", "beat", "-l", "info"]
    volumes:
      - ${SERVER_CONTEXT:-../../server}:/app
    env_file:
      - ../env/.env.local
    environment:
      <<: *api-env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  admin-web:
    build:
      context: ${SCHOOL_ADMIN_CONTEXT:-../../admin-web}
      dockerfile: Dockerfile
      target: development
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    ports:
      # Publish Next dev server to host (container always listens on 3000)
      - "${ADMIN_WEB_HOST_PORT:-3000}:3000"
    volumes:
      # Code from host; node_modules in a named volume so optional native deps (lightningcss, etc.)
      # are installed for Linux inside the container — never use macOS npm install output here.
      - ${SCHOOL_ADMIN_CONTEXT:-../../admin-web}:/app
      - admin_web_node_modules:/app/node_modules
    env_file:
      - ../env/.env.local
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      NEXT_PUBLIC_API_URL_DEV: ${PUBLIC_API_URL:-}
      # Browser on :3000/:3001 must call Flask via nginx (${HTTP_PORT}), not Next.
      NEXT_PUBLIC_GATEWAY_ORIGIN: http://localhost:${HTTP_PORT:-80}
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

  panel:
    build:
      context: ${SUPER_ADMIN_CONTEXT:-../../panel}
      dockerfile: Dockerfile
      target: development
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    ports:
      # Super admin: http://localhost:PANEL_HOST_PORT/ or via nginx http://panel.localhost/ (see nginx.local.conf)
      - "${PANEL_HOST_PORT:-3001}:3000"
    volumes:
      - ${SUPER_ADMIN_CONTEXT:-../../panel}:/app
      - panel_node_modules:/app/node_modules
    env_file:
      - ../env/.env.local
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      NEXT_PUBLIC_API_URL_DEV: ${PUBLIC_API_URL:-}
      NEXT_PUBLIC_GATEWAY_ORIGIN: http://localhost:${HTTP_PORT:-80}
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ../nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      admin-web:
        condition: service_started
      panel:
        condition: service_started
    logging: *default-logging

volumes:
  postgres_data:
  admin_web_node_modules:
  panel_node_modules:
