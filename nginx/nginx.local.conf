user nginx;
worker_processes auto;

error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Re-resolve Docker service names after container recreate (see nginx.prod.conf).
  resolver 127.0.0.11 valid=5s ipv6=off;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 60s;

  access_log /dev/stdout;

  server {
    listen 80 default_server;
    server_name _;

    # Long-lived SSE (notification inbox); must not inherit 60s read timeout on generic /api/
    location = /api/notifications/stream {
      set $api_upstream http://api:5001;
      proxy_pass $api_upstream;
      proxy_buffering off;
      proxy_cache off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 1d;
      proxy_send_timeout 1d;
    }

    location ^~ /api/ {
      set $api_upstream http://api:5001;
      proxy_pass $api_upstream;
      # Match Gunicorn timeout (server/gunicorn_conf.py default 120s). Without this,
      # the http{}-level proxy_read_timeout (60s) can produce 504s while workers are still running.
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }
    location = /api {
      set $api_upstream http://api:5001;
      proxy_pass $api_upstream;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }

    location / {
      set $admin_web_upstream http://admin-web:3000;
      proxy_pass $admin_web_upstream;
    }
  }

  # Super admin — add `127.0.0.1 panel.localhost` to /etc/hosts, then open http://panel.localhost/
  server {
    listen 80;
    server_name panel.localhost;

    location / {
      set $panel_upstream http://panel:3000;
      proxy_pass $panel_upstream;
    }
  }
}

