user  nginx;
worker_processes  auto;

error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 60s;

  access_log /dev/stdout;

  upstream api_upstream {
    server api:5001;
  }

  upstream admin_web {
    server admin-web:3000;
  }

  upstream panel_upstream {
    server panel:3000;
  }

  server {
    # Single source of truth: nginx listens on 8080 inside the container.
    # Every compose file MUST map: "${HTTP_PORT}:8080" (host port → container 8080).
    listen 8080;
    server_name _;

    location ^~ /api/ {
      proxy_pass http://api_upstream;
    }
    location = /api {
      proxy_pass http://api_upstream;
    }

    location ^~ /panel/ {
      proxy_pass http://panel_upstream/;
    }
    location = /panel {
      return 302 /panel/;
    }

    location / {
      proxy_pass http://admin_web;
    }
  }
}
