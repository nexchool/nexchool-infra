# Production reverse proxy (ECR stack + host-run landing).
#
# Landing (Next.js, PM2 on EC2, port 7000 — landing-page/ecosystem.config.cjs):
#   Nginx in Docker reaches the host via host.docker.internal (extra_hosts: host-gateway in compose).
#
# TLS: mount a host directory at /etc/nginx/ssl with fullchain.pem + privkey.pem
# (SAN cert for nexchool.in, www, app, panel, api — or symlink/copy from Certbot).
#
# ACME: mount a writable webroot at /var/www/certbot (see ../nginx/certbot-webroot on the host).
# Initial issuance if port 80 is free: certbot certonly --standalone -d nexchool.in ...
# Renew: certbot renew --webroot -w /path/to/nginx/certbot-webroot

user nginx;
worker_processes auto;

error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 60s;

  access_log /dev/stdout;

  upstream api_upstream {
    server api:5001;
  }

  upstream admin_web {
    server admin-web:3000;
  }

  upstream panel_upstream {
    server panel:3000;
  }

  upstream landing_upstream {
    server host.docker.internal:7000;
  }

  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  server {
    listen 80;
    server_name nexchool.in www.nexchool.in app.nexchool.in panel.nexchool.in api.nexchool.in;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name nexchool.in www.nexchool.in;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location / {
      proxy_pass http://landing_upstream;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name app.nexchool.in;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location / {
      proxy_pass http://admin_web;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name panel.nexchool.in;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location / {
      proxy_pass http://panel_upstream;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name api.nexchool.in;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location = /api/notifications/stream {
      proxy_pass http://api_upstream;
      proxy_buffering off;
      proxy_cache off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 1d;
      proxy_send_timeout 1d;
    }

    location / {
      proxy_pass http://api_upstream;
    }
  }

  server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    return 404;
  }
}
