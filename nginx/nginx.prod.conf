# Production reverse proxy with SSL (Certbot / Let's Encrypt).
#
# Cert location (after certbot certonly --standalone):
#   /etc/letsencrypt/live/app.nexchool.in/fullchain.pem
#   /etc/letsencrypt/live/app.nexchool.in/privkey.pem
#
# ACME renewal (webroot method after initial cert):
#   certbot renew --webroot -w ~/certbot-webroot --quiet
#   docker compose -f ~/docker-compose.prod.yml exec nginx nginx -s reload
#
# Domains served:
#   app.nexchool.in   → admin-web (Next.js)
#   panel.nexchool.in → panel (Next.js)
#   api.nexchool.in   → Flask API (Gunicorn)

user nginx;
worker_processes auto;

error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Docker Compose gives backends new IPs after recreate; static `upstream { server api:5001 }`
  # resolves once at nginx start and then 502s with "Connection refused" until nginx reloads.
  # Variable proxy_pass + embedded DNS re-resolves on each request (see valid=).
  resolver 127.0.0.11 valid=5s ipv6=off;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;

  access_log /dev/stdout;

  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # Redirect all HTTP to HTTPS + handle ACME challenges
  server {
    listen 80;
    server_name app.nexchool.in panel.nexchool.in api.nexchool.in;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # admin-web
  server {
    listen 443 ssl;
    http2 on;
    server_name app.nexchool.in;

    ssl_certificate /etc/letsencrypt/live/app.nexchool.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nexchool.in/privkey.pem;

    location / {
      set $admin_web_upstream http://admin-web:3000;
      proxy_pass $admin_web_upstream;
    }
  }

  # super-admin panel
  server {
    listen 443 ssl;
    http2 on;
    server_name panel.nexchool.in;

    ssl_certificate /etc/letsencrypt/live/app.nexchool.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nexchool.in/privkey.pem;

    location / {
      set $panel_upstream http://panel:3000;
      proxy_pass $panel_upstream;
    }
  }

  # Flask API
  server {
    listen 443 ssl;
    http2 on;
    server_name api.nexchool.in;

    ssl_certificate /etc/letsencrypt/live/app.nexchool.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nexchool.in/privkey.pem;

    # SSE endpoint — long-lived connection, no buffering
    location = /api/notifications/stream {
      set $api_upstream http://api:5001;
      proxy_pass $api_upstream;
      proxy_buffering off;
      proxy_cache off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 1d;
      proxy_send_timeout 1d;
    }

    location / {
      set $api_upstream http://api:5001;
      proxy_pass $api_upstream;
    }
  }

  # Catch-all — reject unknown vhosts
  server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/app.nexchool.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nexchool.in/privkey.pem;

    return 444;
  }
}
