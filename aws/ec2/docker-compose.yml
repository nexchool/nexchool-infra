# Reference only — production copy is generated from terraform/templates/docker-compose.yml.tpl
# Replace REPLACE_ME_* with ECR URLs from `terraform output`.

x-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 100M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: REPLACE_ME_ECR_API:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 300M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
      - .env
    expose:
      - "5001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      redis:
        condition: service_healthy

  celery-worker:
    image: REPLACE_ME_ECR_API:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 200M
    env_file:
      - .env
    entrypoint: ["celery", "-A", "backend.celery_worker:celery", "worker", "-l", "info"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  celery-beat:
    image: REPLACE_ME_ECR_API:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 100M
    env_file:
      - .env
    entrypoint: ["celery", "-A", "backend.celery_worker:celery", "beat", "-l", "info"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  admin-web:
    image: REPLACE_ME_ECR_ADMIN_WEB:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 200M
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  panel:
    image: REPLACE_ME_ECR_PANEL:latest
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 200M
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *json-logging
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 50M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      admin-web:
        condition: service_started
      panel:
        condition: service_started
